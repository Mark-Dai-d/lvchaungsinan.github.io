<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>绿创司南｜大学生绿色创业平台</title>
  <style>
    :root {
      --bg: #f3f7f4;
      --bg-soft: #edf4ef;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.95);
      --panel-muted: rgba(243, 248, 244, 0.94);
      --text: #17362e;
      --text-soft: #5a746a;
      --line: rgba(23, 54, 46, 0.1);
      --line-strong: rgba(23, 54, 46, 0.18);
      --primary: #188e61;
      --primary-strong: #0f704b;
      --primary-soft: rgba(24, 142, 97, 0.12);
      --accent: #d8a545;
      --accent-soft: rgba(216, 165, 69, 0.15);
      --cyan: #1f8ca2;
      --cyan-soft: rgba(31, 140, 162, 0.14);
      --good: #1f9968;
      --warn: #b98321;
      --bad: #b65d5d;
      --shadow-lg: 0 26px 64px rgba(16, 45, 37, 0.08);
      --shadow-md: 0 16px 30px rgba(16, 45, 37, 0.06);
      --shadow-sm: 0 10px 18px rgba(16, 45, 37, 0.05);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --sidebar-width: 250px;
      --max-width: 1600px;
    }
    * {
      box-sizing: border-box;
    }
    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(92, 195, 148, 0.18), transparent 22%),
        radial-gradient(circle at 88% 12%, rgba(221, 202, 115, 0.14), transparent 20%),
        radial-gradient(circle at 82% 82%, rgba(67, 159, 177, 0.1), transparent 24%),
        linear-gradient(180deg, #f8fbf8 0%, #eff5f1 52%, #e8f0eb 100%);
    }
    body {
      overflow-x: hidden;
    }
    button,
    input,
    select,
    textarea {
      font: inherit;
    }
    button {
      border: 0;
      cursor: pointer;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    strong {
      font-weight: 800;
    }
    .app-shell {
      max-width: var(--max-width);
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      min-height: 100vh;
      position: relative;
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 20;
      padding: 22px 18px 18px;
      color: #f0faf4;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.1), transparent 18%),
        radial-gradient(circle at 84% 84%, rgba(255, 255, 255, 0.08), transparent 18%),
        linear-gradient(180deg, #175640 0%, #103d2f 100%);
      box-shadow: 10px 0 36px rgba(12, 37, 29, 0.1);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 10px 18px;
      margin-bottom: 10px;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      position: relative;
      background:
        radial-gradient(circle at 32% 32%, rgba(255, 255, 255, 0.42), transparent 28%),
        linear-gradient(135deg, #7bd7b1, #22946b);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }
    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 999px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .brand-mark::before {
      width: 20px;
      height: 3px;
    }
    .brand-mark::after {
      width: 3px;
      height: 20px;
    }
    .brand-copy strong {
      display: block;
      font-size: 26px;
      letter-spacing: 0.02em;
    }
    .brand-copy span {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(240, 250, 244, 0.74);
    }
    .profile-card {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin: 4px 0 14px;
    }
    .profile-card.empty {
      background: rgba(255, 255, 255, 0.06);
    }
    .profile-card .role {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(240, 250, 244, 0.88);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .profile-card strong {
      display: block;
      font-size: 16px;
      line-height: 1.4;
    }
    .profile-card p {
      margin: 8px 0 0;
      color: rgba(240, 250, 244, 0.74);
      font-size: 12px;
      line-height: 1.75;
    }
    .profile-card .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .nav-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      background: transparent;
      color: rgba(240, 250, 244, 0.88);
      text-align: left;
      transition: transform 0.18s ease, background 0.18s ease;
    }
    .nav-btn:hover,
    .nav-btn.active {
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(2px);
    }
    .nav-btn .icon {
      width: 18px;
      text-align: center;
      opacity: 0.95;
    }
    .nav-btn b {
      font-size: 15px;
    }
    .nav-btn small {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      color: rgba(240, 250, 244, 0.62);
    }
    .sidebar-foot {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(240, 250, 244, 0.76);
      font-size: 12px;
      line-height: 1.75;
    }
    .main {
      min-width: 0;
      padding: 22px 22px 36px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(14px);
    }
    .topbar-title strong {
      display: block;
      font-size: 20px;
      letter-spacing: 0.01em;
    }
    .topbar-title span {
      display: block;
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .search-wrap {
      position: relative;
      min-width: min(360px, 48vw);
    }
    .search-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }
    .search-input:focus {
      border-color: rgba(24, 142, 97, 0.34);
      box-shadow: 0 0 0 4px rgba(24, 142, 97, 0.08);
    }
    .search-wrap::before {
      content: "⌕";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-soft);
      font-size: 16px;
    }
    .search-dropdown {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      max-height: 420px;
      overflow: auto;
      z-index: 12;
    }
    .search-dropdown.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .search-section {
      padding: 8px;
    }
    .search-section + .search-section {
      border-top: 1px solid rgba(23, 54, 46, 0.07);
    }
    .search-section h5 {
      margin: 0 0 10px;
      font-size: 12px;
      color: var(--text-soft);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .search-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      transition: background 0.16s ease;
    }
    .search-item:hover {
      background: rgba(24, 142, 97, 0.06);
    }
    .search-item .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 6px;
      flex: 0 0 auto;
      background: var(--primary);
    }
    .search-item .title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
    }
    .search-item .meta {
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.7;
      margin-top: 4px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
    }
    .btn.primary {
      color: #fff;
      background: linear-gradient(180deg, #219968, #0f6e49);
      box-shadow: 0 12px 24px rgba(24, 142, 97, 0.24);
    }
    .btn.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
    }
    .btn.ghost {
      color: var(--primary-strong);
      background: rgba(24, 142, 97, 0.08);
    }
    .btn.cyan {
      color: var(--cyan);
      background: rgba(31, 140, 162, 0.08);
    }
    .btn.tiny {
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 10px;
    }
    .role-badge,
    .tag,
    .chip,
    .mini-pill,
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .role-badge,
    .mini-pill,
    .tag,
    .chip {
      color: #38554c;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
    }
    .chip {
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
    }
    .chip.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }
    .badge.good {
      color: var(--good);
      background: rgba(31, 153, 104, 0.14);
    }
    .badge.warn {
      color: #8c6520;
      background: rgba(216, 165, 69, 0.16);
    }
    .badge.soft {
      color: #405f55;
      background: rgba(23, 54, 46, 0.08);
    }
    .page {
      display: none;
      animation: fadeIn 0.28s ease;
    }
    .page.active {
      display: block;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .hero,
    .panel,
    .card,
    .metric-card,
    .module-card,
    .insight-card,
    .detail-card,
    .policy-card,
    .case-card,
    .company-card,
    .demand-card,
    .task-card,
    .timeline-card,
    .table-card,
    .trust-card,
    .workspace-card {
      border-radius: var(--radius-lg);
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 28px;
      display: grid;
      gap: 20px;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.84fr);
      background:
        radial-gradient(circle at 88% 18%, rgba(24, 142, 97, 0.12), transparent 20%),
        radial-gradient(circle at 10% 80%, rgba(216, 165, 69, 0.12), transparent 18%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(239, 247, 242, 0.92));
    }
    .hero .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(24, 142, 97, 0.1);
      color: var(--primary-strong);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .hero h1 {
      margin: 16px 0 10px;
      font-size: 56px;
      line-height: 1.04;
      letter-spacing: -0.02em;
    }
    .hero h2 {
      margin: 0;
      font-size: 23px;
      line-height: 1.55;
      color: #2e5147;
      font-weight: 700;
    }
    .hero p {
      margin: 16px 0 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.9;
      max-width: 760px;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .hero-side {
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .metric-card {
      padding: 18px 20px;
      background:
        radial-gradient(circle at 86% 16%, rgba(31, 140, 162, 0.1), transparent 18%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 245, 0.96));
    }
    .metric-card .label {
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 700;
    }
    .metric-card strong {
      display: block;
      margin: 12px 0 8px;
      font-size: 34px;
      line-height: 1;
      color: var(--primary-strong);
    }
    .metric-card p {
      margin: 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.75;
    }
    .page-shell {
      display: grid;
      gap: 18px;
    }
    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-top: 6px;
    }
    .section-head h3 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }
    .section-head p {
      margin: 8px 0 0;
      color: var(--text-soft);
      line-height: 1.8;
      max-width: 760px;
    }
    .grid-2,
    .grid-3,
    .grid-4,
    .page-grid,
    .chart-grid,
    .cards-grid {
      display: grid;
      gap: 16px;
    }
    .grid-2,
    .page-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .grid-4,
    .cards-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .panel,
    .table-card,
    .workspace-card {
      padding: 20px;
    }
    .module-card,
    .detail-card,
    .trust-card,
    .task-card {
      padding: 20px;
    }
    .module-card .icon,
    .detail-card .icon,
    .trust-card .icon,
    .task-card .icon {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: linear-gradient(135deg, #7fd9b5, #24936a);
      color: #fff;
      margin-bottom: 14px;
      box-shadow: 0 12px 20px rgba(36, 147, 106, 0.2);
    }
    .module-card p,
    .detail-card p,
    .trust-card p,
    .panel p,
    .workspace-card p,
    .table-card p {
      color: var(--text-soft);
      line-height: 1.8;
      margin: 0;
    }
    .card-title {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.4;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }
    .field {
      display: grid;
      gap: 8px;
      min-width: 180px;
      flex: 1;
    }
    .field label {
      font-size: 12px;
      font-weight: 800;
      color: #35554d;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .input,
    .select,
    .textarea {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(23, 54, 46, 0.14);
      background: rgba(255, 255, 255, 0.98);
      color: var(--text);
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }
    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: rgba(24, 142, 97, 0.34);
      box-shadow: 0 0 0 4px rgba(24, 142, 97, 0.08);
    }
    .textarea {
      min-height: 112px;
      resize: vertical;
    }
    .chip-row,
    .tag-row,
    .meta-row,
    .action-row,
    .mini-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .mini-grid {
      gap: 12px;
    }
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .stat-pill {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(244, 249, 245, 0.95);
      border: 1px solid rgba(23, 54, 46, 0.08);
    }
    .stat-pill span {
      display: block;
      font-size: 12px;
      color: var(--text-soft);
      font-weight: 700;
    }
    .stat-pill strong {
      display: block;
      margin-top: 6px;
      font-size: 28px;
      color: var(--primary-strong);
      line-height: 1;
    }
    .chart-card,
    .list-card {
      padding: 20px;
      border-radius: var(--radius-lg);
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }
    .chart-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .chart-head h4 {
      margin: 0 0 6px;
      font-size: 20px;
    }
    .chart-head p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.8;
      font-size: 13px;
    }
    .bar-list {
      display: grid;
      gap: 12px;
    }
    .bar-item {
      display: grid;
      grid-template-columns: 142px 1fr 58px;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      color: #38574e;
      font-weight: 700;
    }
    .bar-track {
      position: relative;
      height: 14px;
      border-radius: 999px;
      background: #ebf3ee;
      overflow: hidden;
    }
    .bar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #74d4b0, #1d8d63);
    }
    .bar-fill.accent {
      background: linear-gradient(90deg, #f2cc75, #d7a141);
    }
    .bar-fill.cyan {
      background: linear-gradient(90deg, #7fc7d6, #238ca0);
    }
    .heat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .heat-card {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 88% 18%, rgba(31, 140, 162, 0.12), transparent 18%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 249, 246, 0.94));
      box-shadow: var(--shadow-sm);
    }
    .heat-card h4 {
      margin: 12px 0 4px;
      font-size: 28px;
      line-height: 1;
    }
    .heat-card p {
      margin: 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.75;
    }
    .score-panel {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 18px;
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 18% 20%, rgba(127, 217, 181, 0.16), transparent 28%),
        linear-gradient(180deg, rgba(247, 251, 248, 0.98), rgba(255, 255, 255, 0.96));
    }
    .score-ring {
      width: 160px;
      height: 160px;
      margin: 0 auto;
      border-radius: 50%;
      background: conic-gradient(var(--primary) 0 var(--angle), #dceddf var(--angle) 360deg);
      position: relative;
    }
    .score-ring::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(23, 54, 46, 0.06);
    }
    .score-core {
      position: absolute;
      inset: 16px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .score-core strong {
      font-size: 46px;
      line-height: 1;
      color: var(--primary-strong);
    }
    .score-core span {
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 700;
    }
    .score-grid {
      display: grid;
      gap: 12px;
    }
    .score-kpi {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(245, 250, 247, 0.92);
      border: 1px solid rgba(23, 54, 46, 0.08);
    }
    .score-kpi strong {
      display: block;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .score-kpi p {
      margin: 0;
      font-size: 13px;
      line-height: 1.75;
      color: var(--text-soft);
    }
    .explain-list,
    .task-list,
    .timeline {
      display: grid;
      gap: 12px;
    }
    .explain-item,
    .task-item,
    .timeline-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(246, 250, 247, 0.92);
      border: 1px solid rgba(23, 54, 46, 0.08);
    }
    .explain-item strong,
    .task-item strong,
    .timeline-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }
    .explain-item p,
    .task-item p,
    .timeline-item p {
      margin: 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.8;
    }
    .policy-card,
    .case-card,
    .company-card,
    .demand-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      display: grid;
      gap: 12px;
    }
    .policy-card::after,
    .case-card::after,
    .company-card::after,
    .demand-card::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      right: -44px;
      bottom: -66px;
      border-radius: 50%;
      background: rgba(24, 142, 97, 0.08);
      pointer-events: none;
    }
    .card-top {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .card-top h4 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.45;
      padding-right: 14px;
    }
    .card-top .sub {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.7;
    }
    .card-note {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(250, 246, 232, 0.95);
      border: 1px solid rgba(216, 165, 69, 0.18);
      color: #6e5924;
      font-size: 13px;
      line-height: 1.75;
      font-weight: 700;
    }
    .card-desc {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.82;
      min-height: 66px;
    }
    .card-foot {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .score-line {
      color: #345f51;
      font-size: 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .score-line::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--good);
    }
    .list-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .empty {
      padding: 32px 22px;
      text-align: center;
      color: var(--text-soft);
      border-radius: 20px;
      border: 1px dashed rgba(23, 54, 46, 0.18);
      background: rgba(255, 255, 255, 0.76);
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 18px;
      overflow: hidden;
    }
    .table th,
    .table td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(23, 54, 46, 0.08);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.7;
    }
    .table th {
      background: rgba(244, 249, 246, 0.95);
      color: #38584f;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .table tr:last-child td {
      border-bottom: 0;
    }
    .workspace-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .workspace-stat {
      padding: 16px;
      border-radius: 18px;
      background: rgba(245, 250, 247, 0.94);
      border: 1px solid rgba(23, 54, 46, 0.08);
    }
    .workspace-stat span {
      display: block;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 700;
    }
    .workspace-stat strong {
      display: block;
      margin-top: 6px;
      font-size: 30px;
      line-height: 1;
      color: var(--primary-strong);
    }
    .tab-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      color: #395a50;
      font-size: 13px;
      font-weight: 800;
      transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
    }
    .tab.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }
    .modal-backdrop,
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 25, 20, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 40;
    }
    .modal-backdrop.show,
    .drawer-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      width: min(720px, calc(100vw - 28px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding: 20px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 30px 86px rgba(8, 25, 20, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 41;
      backdrop-filter: blur(14px);
    }
    .modal.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    .modal-head,
    .drawer-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .modal-head h3,
    .drawer-head h3 {
      margin: 0 0 6px;
    }
    .modal-head p,
    .drawer-head p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
      font-size: 13px;
    }
    .auth-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.88fr) minmax(0, 1.12fr);
      gap: 16px;
    }
    .auth-side,
    .auth-main {
      padding: 18px;
      border-radius: 20px;
      background: rgba(245, 250, 247, 0.92);
      border: 1px solid rgba(23, 54, 46, 0.08);
    }
    .auth-side {
      background:
        radial-gradient(circle at 84% 18%, rgba(24, 142, 97, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(245, 250, 247, 0.96), rgba(255, 255, 255, 0.92));
    }
    .demo-login-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .demo-card {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(23, 54, 46, 0.08);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .demo-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .demo-card strong {
      display: block;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .demo-card span {
      display: block;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.75;
    }
    .drawer {
      position: fixed;
      top: 16px;
      right: 16px;
      bottom: 16px;
      width: min(480px, calc(100vw - 32px));
      padding: 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 30px 86px rgba(8, 25, 20, 0.24);
      backdrop-filter: blur(14px);
      transform: translateX(108%);
      transition: transform 0.2s ease;
      z-index: 41;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }
    .drawer.show {
      transform: translateX(0);
    }
    .drawer-body {
      overflow: auto;
      padding-right: 2px;
    }
    .message-box {
      padding: 14px;
      border-radius: 16px;
      background: rgba(245, 249, 246, 0.95);
      border: 1px solid rgba(23, 54, 46, 0.08);
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.82;
      white-space: pre-wrap;
    }
    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 45;
      padding: 12px 16px;
      border-radius: 14px;
      color: #fff;
      background: rgba(12, 70, 51, 0.96);
      box-shadow: 0 20px 36px rgba(8, 25, 20, 0.24);
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .mobile-nav {
      display: none;
      gap: 10px;
      overflow: auto;
      margin-bottom: 12px;
    }
    .auth-required {
      padding: 26px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px dashed rgba(23, 54, 46, 0.18);
      text-align: center;
    }
    .auth-required h4 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .auth-required p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.8;
    }
    @media (max-width: 1360px) {
      .hero,
      .grid-4,
      .cards-grid,
      .heat-grid,
      .workspace-stats,
      .stat-strip,
      .list-grid,
      .grid-3,
      .page-grid {
        grid-template-columns: 1fr;
      }
      .auth-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 1100px) {
      .app-shell {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
      .mobile-nav {
        display: flex;
      }
    }
    @media (max-width: 820px) {
      .main {
        padding: 14px 14px 24px;
      }
      .topbar {
        padding: 12px 14px;
        flex-direction: column;
        align-items: stretch;
      }
      .topbar-actions {
        width: 100%;
        justify-content: flex-start;
      }
      .search-wrap {
        min-width: 0;
        width: 100%;
      }
      .hero,
      .chart-card,
      .list-card,
      .panel,
      .module-card,
      .detail-card,
      .trust-card,
      .workspace-card,
      .task-card {
        padding: 16px;
      }
      .hero h1 {
        font-size: 42px;
      }
      .score-panel {
        grid-template-columns: 1fr;
      }
      .bar-item {
        grid-template-columns: 104px 1fr 50px;
      }
      .grid-2,
      .page-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-copy">
          <strong>绿创司南</strong>
          <span>大学生绿色创业平台<br />找方向、找政策、找灵感、找合作</span>
        </div>
      </div>
      <div class="profile-card" id="sidebarProfileCard"></div>
      <div class="nav-list" id="sideNav"></div>
      <div class="sidebar-foot" id="sidebarFoot"></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <strong id="topbarTitle">大学生绿色创业，从第一步开始更稳</strong>
          <span id="topbarSubtitle">洞察市场信号、诊断项目准备度、筛选政策资源，并和企业建立更可信的合作路径。</span>
        </div>
        <div class="topbar-actions">
          <div class="search-wrap">
            <input class="search-input" id="globalSearch" type="text" placeholder="搜索政策、案例、企业、需求" />
            <div class="search-dropdown" id="searchDropdown"></div>
          </div>
          <button class="btn secondary" id="sourceButton">数据来源</button>
          <button class="btn primary" id="authButton">登录 / 注册</button>
        </div>
      </header>
      <div class="mobile-nav" id="mobileNav"></div>
      <section class="page active" id="page-home"></section>
      <section class="page" id="page-insight"></section>
      <section class="page" id="page-diagnosis"></section>
      <section class="page" id="page-policy"></section>
      <section class="page" id="page-inspiration"></section>
      <section class="page" id="page-collaboration"></section>
      <section class="page" id="page-workspace"></section>
    </main>
  </div>
  <div class="modal-backdrop" id="authBackdrop"></div>
  <div class="modal" id="authModal">
    <div class="modal-head">
      <div>
        <h3 id="authTitle">登录绿创司南</h3>
        <p>登录后可保存项目画像、收藏政策与案例、申请企业需求并持续管理合作进度。</p>
      </div>
      <button class="btn secondary tiny" id="authCloseButton">关闭</button>
    </div>
    <div class="tab-row">
      <button class="tab active" data-auth-mode="login">登录</button>
      <button class="tab" data-auth-mode="register">注册</button>
    </div>
    <div class="auth-grid">
      <div class="auth-side">
        <h4 style="margin:0 0 10px;">体验账号</h4>
        <p style="margin:0;color:var(--text-soft);line-height:1.8;">如果你想直接预览完整功能，可以先用内置的学生或企业体验账号登录。</p>
        <div class="demo-login-list" id="demoLoginList"></div>
      </div>
      <div class="auth-main">
        <div class="field" id="registerRoleField" style="display:none;">
          <label for="authRole">角色</label>
          <select class="select" id="authRole">
            <option value="student">大学生团队</option>
            <option value="enterprise">企业用户</option>
          </select>
        </div>
        <div class="field" id="registerNameField" style="display:none;">
          <label for="authName">名称</label>
          <input class="input" id="authName" type="text" placeholder="团队名称 / 企业名称 / 你的姓名" />
        </div>
        <div class="field" id="registerOrgField" style="display:none;">
          <label for="authOrg">学校或机构</label>
          <input class="input" id="authOrg" type="text" placeholder="例如：广东工业大学 / 某企业创新中心" />
        </div>
        <div class="field">
          <label for="authEmail">邮箱</label>
          <input class="input" id="authEmail" type="email" placeholder="请输入邮箱" />
        </div>
        <div class="field">
          <label for="authPassword">密码</label>
          <input class="input" id="authPassword" type="password" placeholder="请输入密码" />
        </div>
        <div class="action-row">
          <button class="btn primary" id="authSubmitButton">登录</button>
          <button class="btn ghost" id="authSwitchButton">没有账号？去注册</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop" id="demandBackdrop"></div>
  <div class="modal" id="demandModal">
    <div class="modal-head">
      <div>
        <h3>发布企业合作需求</h3>
        <p>发布后会出现在需求大厅中，只有经过企业登录的账号才能创建和管理自己的需求。</p>
      </div>
      <button class="btn secondary tiny" id="demandCloseButton">关闭</button>
    </div>
    <div class="grid-2">
      <div class="field">
        <label for="demandTitle">需求标题</label>
        <input class="input" id="demandTitle" type="text" placeholder="例如：寻找校园低碳运营试点团队" />
      </div>
      <div class="field">
        <label for="demandTrack">目标赛道</label>
        <select class="select" id="demandTrack"></select>
      </div>
      <div class="field">
        <label for="demandRegion">合作地区</label>
        <select class="select" id="demandRegion"></select>
      </div>
      <div class="field">
        <label for="demandMode">合作方式</label>
        <select class="select" id="demandMode">
          <option value="场景试点">场景试点</option>
          <option value="技术共创">技术共创</option>
          <option value="联合开发">联合开发</option>
          <option value="联合路演">联合路演</option>
          <option value="校地协同">校地协同</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="demandTech">希望具备的数字能力</label>
      <input class="input" id="demandTech" type="text" placeholder="例如：平台系统 / 数据分析 / AI" />
    </div>
    <div class="field">
      <label for="demandSummary">需求说明</label>
      <textarea class="textarea" id="demandSummary" placeholder="请描述合作场景、希望团队完成的任务以及你能提供的资源。"></textarea>
    </div>
    <div class="action-row">
      <button class="btn primary" id="demandSubmitButton">发布需求</button>
      <button class="btn secondary" id="demandCancelButton">取消</button>
    </div>
  </div>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <div>
        <h3 id="drawerTitle">详情</h3>
        <p id="drawerSubtitle"></p>
      </div>
      <button class="btn secondary tiny" id="drawerCloseButton">关闭</button>
    </div>
    <div class="meta-row" id="drawerMeta"></div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="action-row" id="drawerActions"></div>
  </aside>
  <div class="toast" id="toast"></div>
  <script>
    const DATA = __DATA_JSON__;
  </script>
  <script>
    (() => {
      const STORAGE = {
        accounts: 'green.customer.accounts.v1',
        session: 'green.customer.session.v1',
        appState: 'green.customer.state.v1',
        demands: 'green.customer.demands.v1',
        applications: 'green.customer.applications.v1',
        messages: 'green.customer.messages.v1',
        teams: 'green.customer.teams.v1'
      };
      const NAVS = [
        { id: 'home', label: '首页', icon: '⌂', hint: '今日任务与推荐' },
        { id: 'insight', label: '市场洞察', icon: '◔', hint: '赛道、地区与企业热力' },
        { id: 'diagnosis', label: '项目画像', icon: '✎', hint: '评估准备度与行动建议' },
        { id: 'policy', label: '政策资源', icon: '🧭', hint: '筛选支持与办理路径' },
        { id: 'inspiration', label: '灵感案例', icon: '✦', hint: '数字绿色案例库' },
        { id: 'collaboration', label: '合作大厅', icon: '⇄', hint: '企业匹配与需求申请' },
        { id: 'workspace', label: '我的工作台', icon: '▣', hint: '收藏、申请、消息与任务' }
      ];
      const ROLE_LABEL = {
        guest: '访客',
        student: '大学生团队',
        enterprise: '企业用户'
      };
      const ROLE_HINT = {
        student: '保存项目画像、跟进政策和合作进度',
        enterprise: '发布合作需求、筛选团队并推进试点',
        guest: '登录后可保存你的进度与收藏'
      };
      const DEFAULT_PROFILE = {
        projectName: '校园循环经济与低碳积分平台',
        track: DATA.filters.tracks[1] || DATA.filters.tracks[0] || '固废回收与循环利用',
        region: DATA.filters.regions.includes('广东省') ? '广东省' : (DATA.filters.regions[0] || '上海市'),
        stage: '筹备试点',
        teamSize: '4-6人',
        budget: '5-20万元',
        digitalFocus: DATA.filters.techs.includes('平台系统') ? '平台系统' : (DATA.filters.techs[0] || '平台系统'),
        needs: ['政策申报', '场景试点', '技术共创'],
        goals: ['完成试点', '企业合作', '赛事路演'],
        description: '围绕校园和周边社区的低碳回收、绿色积分、商家联动与数据运营，先做校内验证，再逐步拓展到社区与企业协同场景。'

        const techHints = getTechHints(profile.digitalFocus);
        const supportNeeded = unique(profile.needs.flatMap((item) => NEED_SUPPORT_MAP[item] || []));
        return DATA.policies.map((policy) => {
          let score = 36;
          score += rankLabel(policy.fit, fitRank) * 10;
          score += rankLabel(policy.studentRelevance, relRank) * 6;
          score += rankLabel(policy.entrepreneurshipRelevance, relRank) * 6;
          score += rankLabel(policy.greenRelevance, relRank) * 4;
          score += rankLabel(policy.digitalRelevance, relRank) * 4;
          if (policy.region === profile.region || policy.province === profile.region) score += 14;
          else if (policy.level === '国家级') score += 7;
          if (supportNeeded.includes(policy.primarySupportType) || policy.supportTypes.some((item) => supportNeeded.includes(item))) score += 12;
          if (policy.targetGroups.some((item) => /大学生|高校毕业生|青年|创业者/.test(item))) score += 8;
          if (policy.greenTags.some((tag) => preferredProblems.some((problem) => tag.includes(problem.slice(0, 2))))) score += 6;
          if (policy.digitalKeywords.some((keyword) => techHints.some((tech) => keyword.includes(tech.slice(0, 2))))) score += 5;
          if (profile.stage === '筹备试点' && ['孵化场地', '平台服务', '赛事活动'].includes(policy.primarySupportType)) score += 4;
          if (profile.needs.includes('资金对接') && ['补贴资助', '贷款贴息'].includes(policy.primarySupportType)) score += 5;
          return { ...policy, recommendScore: clamp(Math.round(score), 58, 98) };

      function scoreCases(profile) {

          if (profile.needs.includes('技术共创') && item.techTags.length >= 2) score += 5;

      function submitAuth() {
        const email = dom.authEmail.value.trim().toLowerCase();
        const password = dom.authPassword.value.trim();
        if (!email || !password) {
          showToast('请填写邮箱和密码。');
          return;
        }
        if (authMode === 'login') {
          const account = getAccounts().find((item) => item.email === email && item.password === password);
          if (!account) {
            showToast('账号或密码不正确。');
            return;
          }
          saveJson(STORAGE.session, { accountId: account.id });
          syncStateFromSession();
          closeAuthModal();
          renderAllPages();
          showToast('登录成功。');
          return;
        }
        const role = dom.authRole.value;
        const name = dom.authName.value.trim();
        const org = dom.authOrg.value.trim();
        if (!name) {
          showToast('请填写名称。');

        const accounts = getAccounts();

          showToast('该邮箱已经注册过账号。');
          return;

        const account = {
          id: `acc-${Date.now()}`,
          role,
          name,
          org,
          email,
          password,
          verified: false,
          createdAt: '今天',
          workspace: createWorkspaceDefaults(role)

              <div class="task-item">
                <strong>希望团队具备</strong>
                <p>${escapeHtml(item.expectation.join('、') || '要求待补充')}</p>
              </div>
              <div class="task-item">
                <strong>当前申请情况</strong>
                <p>已有 ${formatNumber(item.applyCount)} 组团队关注或申请。</p>
              </div>
            </div>
          `,
          actions: isStudent() ? [
            { id: 'apply-demand', label: '申请合作', kind: 'primary', targetId: item.id },
            { id: 'close-drawer', label: '关闭', kind: 'secondary', targetId: item.id }
          ] : [{ id: 'close-drawer', label: '关闭', kind: 'secondary', targetId: item.id }]
        });
      }
      function renderSearchResults(query) {
        if (!query.trim()) {
          dom.searchDropdown.classList.remove('show');
          dom.searchDropdown.innerHTML = '';
          return;
        }
        const key = normalizeText(query);
        const policies = scorePolicies(currentProfile()).filter((item) => normalizeText(item.title).includes(key)).slice(0, 4);
        const cases = scoreCases(currentProfile()).filter((item) => normalizeText([item.title, item.school].join(' ')).includes(key)).slice(0, 4);
        const companies = scoreCompanies(currentProfile()).filter((item) => normalizeText([item.name, item.region, item.industry, ...item.tracks].join(' ')).includes(key)).slice(0, 4);
        const demands = scoreDemands(currentProfile()).filter((item) => normalizeText([item.title, item.companyName, item.track].join(' ')).includes(key)).slice(0, 4);
        const sections = [
          ['政策', policies, 'policy'],
          ['案例', cases, 'case'],
          ['企业', companies, 'company'],
          ['需求', demands, 'demand']
        ].filter((item) => item[1].length);
        if (!sections.length) {
          dom.searchDropdown.innerHTML = '<div class="search-section"><div class="search-item"><div class="dot"></div><div><div class="title">没有找到相关内容</div><div class="meta">尝试换一个关键词，或者直接切换到对应页面继续筛选。</div></div></div></div>';
          dom.searchDropdown.classList.add('show');
          return;
        }
        dom.searchDropdown.innerHTML = sections.map(([label, list, type]) => `
          <div class="search-section">
            <h5>${label}</h5>
            ${list.map((item) => `
              <button class="search-item" data-search-open="${type}" data-id="${escapeHtml(item.id)}">
                <div class="dot"></div>
                <div>
                  <div class="title">${escapeHtml(item.title || item.name)}</div>
                  <div class="meta">${escapeHtml(item.region || item.companyName || item.school || item.primarySupportType || '')}</div>
                </div>
              </button>
            `).join('')}
          </div>
        `).join('');
        dom.searchDropdown.classList.add('show');
      }
      function showToast(message) {
        dom.toast.textContent = message;
        dom.toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => dom.toast.classList.remove('show'), 2200);
      }
      function bindEvents() {
        document.body.addEventListener('click', (event) => {
          const pageTarget = event.target.closest('[data-page-id]');
          if (pageTarget) {
            switchPage(pageTarget.dataset.pageId);
            return;
          }
          const actionTarget = event.target.closest('[data-action]');
          if (actionTarget) {
            const action = actionTarget.dataset.action;
            const id = actionTarget.dataset.id || actionTarget.dataset.targetId || '';
            if (action === 'open-auth') openAuthModal('login');
            if (action === 'logout') logout();
            if (action === 'save-profile') {
              const nextProfile = collectProfileForm();
              setCurrentProfile(nextProfile);
              renderAllPages();
              showToast('项目画像已保存。');
            }
            if (action === 'toggle-policy-save') toggleSaved('savedPolicies', id, getSavedIds('savedPolicies').includes(id) ? '政策已移出收藏。' : '政策已加入收藏。');
            if (action === 'toggle-case-save') toggleSaved('savedCases', id, getSavedIds('savedCases').includes(id) ? '案例已移出灵感板。' : '案例已加入灵感板。');
            if (action === 'toggle-intent') toggleIntent(id);
            if (action === 'advance-intent') advanceIntent(id);
            if (action === 'message-company') startCompanyMessage(id);
            if (action === 'apply-demand') applyDemand(id);
            if (action === 'open-policy-detail') openPolicyDetail(id);
            if (action === 'open-case-detail') openCaseDetail(id);
            if (action === 'open-company-detail') openCompanyDetail(id);
            if (action === 'open-demand-detail') openDemandDetail(id);
            if (action === 'open-demand-modal') openDemandModal();
            return;
          }
          const authModeTarget = event.target.closest('[data-auth-mode]');
          if (authModeTarget) {
            authMode = authModeTarget.dataset.authMode;
            renderAuthMode();
            return;
          }
          const collabTabTarget = event.target.closest('[data-collab-tab]');
          if (collabTabTarget) {
            appState.collabTab = collabTabTarget.dataset.collabTab;
            saveAppState();
            renderCollaborationPage();
            return;
          }
          const demoTarget = event.target.closest('[data-demo-role]');
          if (demoTarget) {
            const role = demoTarget.dataset.demoRole;
            const email = role === 'student' ? 'demo@student.green' : 'demo@enterprise.green';
            const account = getAccounts().find((item) => item.email === email);
            if (account) {
              saveJson(STORAGE.session, { accountId: account.id });
              syncStateFromSession();
              closeAuthModal();
              renderAllPages();
              showToast('已进入体验账号。');
            }
            return;
          }
          const searchOpenTarget = event.target.closest('[data-search-open]');
          if (searchOpenTarget) {
            const type = searchOpenTarget.dataset.searchOpen;
            const id = searchOpenTarget.dataset.id;
            if (type === 'policy') openPolicyDetail(id);
            if (type === 'case') openCaseDetail(id);
            if (type === 'company') openCompanyDetail(id);
            if (type === 'demand') openDemandDetail(id);
            dom.searchDropdown.classList.remove('show');
            return;
          }
          const arrayToggle = event.target.closest('[data-profile-array]');
          if (arrayToggle) {
            const key = arrayToggle.dataset.profileArray;
            const value = arrayToggle.dataset.value;
            const next = deepCopy(currentProfile());
            if (next[key].includes(value)) next[key] = next[key].filter((item) => item !== value);
            else next[key] = [...next[key], value];
            setCurrentProfile(next);
            renderDiagnosisPage();
            renderHomePage();
            renderCollaborationPage();
            renderWorkspacePage();
            return;
          }
          const drawerAction = event.target.closest('[data-drawer-action]');
          if (drawerAction) {
            const action = drawerAction.dataset.drawerAction;
            const id = drawerAction.dataset.targetId || '';
            if (action === 'toggle-policy-save') toggleSaved('savedPolicies', id, getSavedIds('savedPolicies').includes(id) ? '政策已移出收藏。' : '政策已加入收藏。');
            if (action === 'toggle-case-save') toggleSaved('savedCases', id, getSavedIds('savedCases').includes(id) ? '案例已移出灵感板。' : '案例已加入灵感板。');
            if (action === 'toggle-intent') toggleIntent(id);
            if (action === 'message-company') startCompanyMessage(id);
            if (action === 'apply-demand') applyDemand(id);
            if (action === 'close-drawer') closeDrawer();
            return;
          }
        });
        dom.authButton.addEventListener('click', () => {
          if (getCurrentUser()) {
            openDrawer({
              title: '账号信息',
              subtitle: getCurrentUser().email,
              meta: [ROLE_LABEL[getCurrentUser().role], getCurrentUser().verified ? '已认证' : '未认证'],
              body: `<div class="message-box">${escapeHtml(getCurrentUser().name)}${getCurrentUser().org ? ` · ${escapeHtml(getCurrentUser().org)}` : ''}</div>`,
              actions: [{ id: 'close-drawer', label: '关闭', kind: 'secondary' }]
            });
          } else {
            openAuthModal('login');
          }
        });
        dom.sourceButton.addEventListener('click', openSourcesDrawer);
        dom.authBackdrop.addEventListener('click', closeAuthModal);
        dom.authCloseButton.addEventListener('click', closeAuthModal);
        dom.authSubmitButton.addEventListener('click', submitAuth);
        dom.authSwitchButton.addEventListener('click', () => {
          authMode = authMode === 'login' ? 'register' : 'login';
          renderAuthMode();
        });
        dom.demandBackdrop.addEventListener('click', closeDemandModal);
        dom.demandCloseButton.addEventListener('click', closeDemandModal);
        dom.demandCancelButton.addEventListener('click', closeDemandModal);
        dom.demandSubmitButton.addEventListener('click', createDemandFromModal);
        dom.drawerBackdrop.addEventListener('click', closeDrawer);
        dom.drawerCloseButton.addEventListener('click', closeDrawer);
        dom.globalSearch.addEventListener('input', (event) => renderSearchResults(event.target.value));
        dom.globalSearch.addEventListener('focus', (event) => renderSearchResults(event.target.value));
        document.addEventListener('click', (event) => {
          if (!event.target.closest('.search-wrap')) dom.searchDropdown.classList.remove('show');
        });
        document.addEventListener('keydown', (event) => {
          if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
            event.preventDefault();
            dom.globalSearch.focus();
          }
          if (event.key === 'Escape') {
            closeAuthModal();
            closeDemandModal();
            closeDrawer();
            dom.searchDropdown.classList.remove('show');
          }
        });
        document.addEventListener('input', handleFilterInput);
        document.addEventListener('change', handleFilterInput);
      }
      function handleFilterInput(event) {
        const id = event.target.id;
        if (!id) return;
        if (id === 'policyKeyword' || id === 'policyRegion' || id === 'policySupport' || id === 'policyFit') {
          appState.policyFilters.keyword = document.getElementById('policyKeyword')?.value || '';
          appState.policyFilters.region = document.getElementById('policyRegion')?.value || '全部';
          appState.policyFilters.support = document.getElementById('policySupport')?.value || '全部';
          appState.policyFilters.fit = document.getElementById('policyFit')?.value || '全部';
          saveAppState();
          renderPolicyPage();
        }
        if (id === 'caseKeyword' || id === 'caseProblem' || id === 'caseTech' || id === 'caseMode') {
          appState.caseFilters.keyword = document.getElementById('caseKeyword')?.value || '';
          appState.caseFilters.problem = document.getElementById('caseProblem')?.value || '全部';
          appState.caseFilters.tech = document.getElementById('caseTech')?.value || '全部';
          appState.caseFilters.mode = document.getElementById('caseMode')?.value || '数字绿色';
          saveAppState();
          renderInspirationPage();
        }
        if (id === 'companyKeyword' || id === 'companyTrack' || id === 'companyRegion' || id === 'companyMode') {
          appState.companyFilters.keyword = document.getElementById('companyKeyword')?.value || '';
          appState.companyFilters.track = document.getElementById('companyTrack')?.value || '全部';
          appState.companyFilters.region = document.getElementById('companyRegion')?.value || '全部';
          appState.companyFilters.mode = document.getElementById('companyMode')?.value || '全部';
          saveAppState();
          renderCollaborationPage();
        }
      }
      function collectProfileForm() {
        return {
          projectName: document.getElementById('profileProjectName')?.value.trim() || DEFAULT_PROFILE.projectName,
          track: document.getElementById('profileTrack')?.value || DEFAULT_PROFILE.track,
          region: document.getElementById('profileRegion')?.value || DEFAULT_PROFILE.region,
          stage: document.getElementById('profileStage')?.value || DEFAULT_PROFILE.stage,
          teamSize: document.getElementById('profileTeamSize')?.value || DEFAULT_PROFILE.teamSize,
          budget: document.getElementById('profileBudget')?.value || DEFAULT_PROFILE.budget,
          digitalFocus: document.getElementById('profileDigitalFocus')?.value || DEFAULT_PROFILE.digitalFocus,
          needs: currentProfile().needs,
          goals: currentProfile().goals,
          description: document.getElementById('profileDescription')?.value.trim() || DEFAULT_PROFILE.description
        };
      }
    })();
  </script>
</body>
</html>
